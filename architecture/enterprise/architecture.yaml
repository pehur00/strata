standards:
- id: event-driven-architecture-pattern
  name: Event-Driven Architecture Pattern
  category: architecture
  status: adopt
  rationale: Decouples 23 point-to-point integrations, enables real-time fault correlation,
    supports event replay for audit and incident investigation, foundation for real-time
    analytics and ML pipelines
  alternatives: []
- id: avro-protobuf-schema-enforcement
  name: Avro/Protobuf Schema Enforcement
  category: data
  status: adopt
  rationale: Ensure schema consistency across Kafka topics via Confluent Schema Registry
  alternatives: []
- id: data-product-output-ports
  name: Data Product Output Ports
  category: data
  status: adopt
  rationale: All products must expose at minimum a SQL port and a streaming port via
    Kafka for standardised data access
  alternatives: []
- id: data-product-sla-tiers
  name: Data Product SLA Tiers
  category: data
  status: adopt
  rationale: Gold (< 5 min latency, 99.9% SLA), Silver (< 1 hour), Bronze (daily batch)
    for quality assurance
  alternatives: []
- id: data-product-quality-checks
  name: Data Product Quality Checks
  category: data
  status: adopt
  rationale: Great Expectations checks mandatory before promotion to Silver/Gold tier
  alternatives: []
- id: kubernetes
  name: Kubernetes
  category: compute-platform
  status: adopt
  rationale: Single deployment model across environments, standardised observability,
    uniform security posture management
  alternatives: []
- id: containerd
  name: containerd
  category: container-runtime
  status: adopt
  rationale: Standardised container runtime across all Kubernetes clusters
  alternatives: []
- id: cilium
  name: Cilium
  category: networking
  status: adopt
  rationale: eBPF-based networking, replaces kube-proxy for improved performance
  alternatives: []
- id: istio
  name: Istio
  category: service-mesh
  status: adopt
  rationale: mTLS between all services for security and observability
  alternatives: []
- id: opentelemetry
  name: OpenTelemetry
  category: observability
  status: adopt
  rationale: Standardised observability collection and correlation
  alternatives: []
- id: grafana
  name: Grafana
  category: observability
  status: adopt
  rationale: Unified observability platform replacing Datadog and CloudWatch
  alternatives: []
- id: prometheus
  name: Prometheus
  category: metrics
  status: adopt
  rationale: Standardised metrics collection across all clusters
  alternatives: []
- id: loki
  name: Loki
  category: logging
  status: adopt
  rationale: Log aggregation as part of Grafana stack
  alternatives: []
- id: tempo
  name: Tempo
  category: tracing
  status: adopt
  rationale: Distributed tracing as part of Grafana stack
  alternatives: []
- id: argocd
  name: ArgoCD
  category: gitops
